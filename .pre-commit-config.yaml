# .pre-commit-config.yaml
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff supercedes both Black, isort, and Pylint
    rev: v0.4.1
    hooks:
      # Run the linter (replaces Pylint)
      - id: ruff
        args: [ --fix ]
      # Run the formatter (replaces Black)
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: \.(js|jsx|ts|tsx|css|html|json)$
        exclude: "package-lock.json"
