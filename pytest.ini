[pytest]
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ensure the project root is added to sys.path
pythonpath = .

addopts =
    -v
    --tb=short
    --strict-markers

markers =
    audit: marks tests that directly cover audit-identified bugs
    slow: marks tests that run full simulations (deselect with -m "not slow")
