services:
  db:
    image: postgres:15
    container_name: simuorg_copy_db
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: simuorg_copy_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: simuorg_rabbitmq
    ports:
      - "5672:5672"    # Celery broker
      - "15672:15672"  # Management UI (http://localhost:15672)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  redis:
    image: redis:7-alpine
    container_name: simuorg_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: