services:
  db:
    image: postgres:15
    restart: always
    container_name: simuorg_db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: simuorg_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data: