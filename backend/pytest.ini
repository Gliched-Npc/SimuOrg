[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Show full diffs on assertion failures
addopts =
    -v
    --tb=short
    --strict-markers

# Custom markers (add more as needed)
markers =
    audit: marks tests that directly cover audit-identified bugs
    slow: marks tests that run full simulations (deselect with -m "not slow")
